# .github/workflows/publish.yml
name: publish
on: { push: { tags: ['v*'] } }
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, registry-url: 'https://registry.npmjs.org' }
      - run: npm ci
      # Duplicate-version guard: a tag re-push or a manually pre-published
      # version must no-op instead of failing the run.
      - name: Check whether this version is already on npm
        id: check
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "goldgate@$V" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --provenance --access public
        if: steps.check.outputs.exists == 'false'
        env: { NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}' }
